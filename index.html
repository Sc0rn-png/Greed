<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>GREED LIFE</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* --- STYLES ORIGINAUX (CONSERVÉS) --- */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0d0a06;overflow-x:hidden;}
body{font-family:'DM Mono',monospace;user-select:none;-webkit-user-select:none;color:#fff;}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}
@keyframes btnPulse{0%,100%{box-shadow:0 8px 0 #2a0a00,0 0 30px rgba(255,80,0,0.35)}50%{box-shadow:0 8px 0 #2a0a00,0 0 55px rgba(255,80,0,0.65)}}

.page{width:100%;max-width:480px;margin:0 auto;padding:24px 20px;display:flex;flex-direction:column;gap:12px;position:relative;min-height:100vh;}
.topbar{display:flex;justify-content:space-between;align-items:center;padding-bottom:7px;border-bottom:1px solid rgba(255,160,30,0.2);}
.logo{font-size:10px;letter-spacing:8px;color:rgba(255,160,30,0.7);font-weight:500;}

/* BANQUE */
.bank-wrap{text-align:center;padding:4px 0;}
.bank-amount{font-size: 6vh; margin: -5px 0;font-weight:300;letter-spacing:-2px;line-height:1;text-shadow:0 0 30px rgba(255,160,30,0.2);}
.color-neutral { color: #ffffff !important; } /* Blanc */
.color-profit  { color: #00ff94 !important; } /* Vert néon */
.color-loss    { color: #ff2251 !important; } /* Rouge néon */
    
/* CHARTE NÉON */
.chart-box{background:rgba(0,0,0,0.4);border:1px solid rgba(255,160,30,0.15);margin-top: 0;border-radius:6px;padding:8px 0;position:relative;overflow:hidden;}
.chart-midline{position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,255,255,0.06);z-index:1;}
.phase-lbl{position:absolute;top:5px;left:8px;font-size:8px;letter-spacing:2px;z-index:2;}

/* BOSS */
.char-row {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    min-height: auto;
    height: 15vh;
    margin-top: 0;
    margin-bottom: -10px; /* Supprime l'espace sous le boss */
    padding-bottom: 0;
}
.char-emoji img {
    display: block;
    width: 110px; 
    height: auto;
    vertical-align: bottom; /* Aligne l'image sur le bas du flux */
    margin-bottom: -10px;   /* Compense la transparence sous les pieds du boss */
}
.boss-bubble{flex:1;background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(255,180,0,0.25);border-radius:0 12px 12px 12px;padding:10px 12px;font-size:11px;color:rgba(255,220,100,0.9);line-height:1.5;font-style:italic;}

/* GAUGE */
.gauge-val{font-size:24px;font-weight:500;transition:color 0.1s;}
.gauge-track{position:relative;height:16px;background:rgba(0,0,0,0.5);border-radius:8px;overflow:hidden;border:1px solid rgba(255,160,30,0.15);}
.gauge-fill{position:absolute;top:0;bottom:0;border-radius:8px;left:50%;width:0%;}

:root {
    /* Couleur par défaut (SÉCURISÉ) */
    --speed-color: #00f7c2;
    --speed-glow: rgba(0, 247, 194, 0.6);
}

.speed-box {
    background: #000;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #1a1a1a;
}

.speed-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 20px; /* Un peu plus d'espace */
}

/* Titres et Pourcentage dynamiques */
.speed-label, .speed-val {
    color: var(--speed-color);
    text-shadow: 0 0 12px var(--speed-glow);
    transition: all 0.3s ease;
}

#speedSlider {
    -webkit-appearance: none;
    display: block;
    width: 100% !important; /* Force la jauge à s'étaler */
    height: 4px;
    margin: 20px 0;
    background: #222;
}

#speedSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    height: 18px;
    width: 18px;
    border-radius: 50%;
    background: var(--speed-color);
    box-shadow: 0 0 15px var(--speed-color);
    margin-top: -7px; /* C'est cette ligne qui fait le "remontage" */
    cursor: pointer;
}

#speedSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    height: 18px;
    width: 18px;
    border-radius: 50%;
    background: var(--speed-color);
    box-shadow: 0 0 15px var(--speed-color);
    cursor: pointer;
    transition: background 0.3s ease, box-shadow 0.3s ease;
    /* Le retrait du margin-top négatif aide au centrage selon les navigateurs */
    margin-top: 0; 
}

/* Pour Firefox */
#speedSlider::-moz-range-thumb {
    height: 18px;
    width: 18px;
    border: none;
    border-radius: 50%;
    background: var(--speed-color);
    box-shadow: 0 0 15px var(--speed-color);
}

.speed-footer {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: #444;
    margin-top: 10px;
}
    
/* BOUTON */
.btn-wrap{display:flex;justify-content:center;padding:20px 0;}
#holdBtn{width:130px;height:130px;border-radius:50%;border:none;cursor:pointer;outline:none;background:radial-gradient(circle at 35% 30%,#ff2251 0%,#aa1535 60%,#660d20 100%);box-shadow:0 8px 0 #4d0a18;color:#fff;font-weight:bold;animation:btnPulse 2s infinite;}
#holdBtn:active{transform:translateY(4px);box-shadow:0 4px 0 #4d0a18;}

/* RÉSULTATS */
#resultBox{display:none;animation:slideUp 0.3s ease;}
.arcade-btn{width:100%;padding:16px 0;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:5px;background:rgba(255,160,30,0.1);border:2px solid #ff9f1e;color:#ff9f1e;border-radius:6px;cursor:pointer;margin-top:10px;}
</style>
</head>
<body>
<div id="introScreen" style="position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; font-family: 'DM Mono', monospace;">
    
    <div id="introContent" style="width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center;">
        
        <div style="width: 85%; height: 65vh; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255, 160, 30, 0.4); background: #0d0a06; margin-bottom: 20px; box-shadow: 0 0 20px rgba(255,160,30,0.1);">
            <img id="introImage" src="" style="width: 100%; height: 100%; object-fit: cover; display: block;">
        </div>
        
        <div style="width: 100%; min-height: 80px; display: flex; align-items: center; justify-content: center;">
            <p id="introText" style="color: #eee; font-size: 15px; line-height: 1.5; text-align: center; margin: 0; padding: 0 10px; transition: opacity 0.3s;"></p>
        </div>
        
        <button onclick="nextSlide()" style="margin-top: 30px; background: #ff9f1e; color: #000; border: none; padding: 14px 40px; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'DM Mono'; text-transform: uppercase; letter-spacing: 1px;">
            SUIVANT
        </button>
        
    </div>
</div>
<div id="gameOverScreen" style="display:none; position:fixed; inset:0; background:#000; z-index:10000; flex-direction:column; align-items:center; justify-content:center; padding:20px; text-align:center; font-family:'DM Mono';">
    <div style="width:80%; max-width:300px; height:200px; border-radius:15px; border:2px solid #ff2251; overflow:hidden; margin-bottom:20px; box-shadow: 0 0 20px rgba(255,34,81,0.3);">
        <img src="images/game_over.jpg" style="width:100%; height:100%; object-fit:cover;">
    </div>
    <h1 style="color:#ff2251; font-size:24px; letter-spacing:4px; margin-bottom:10px;">GAME OVER</h1>
    <p style="color:#666; font-size:10px; margin-bottom:30px; line-height:1.4;">"Je t'avais prévenu... On ne joue pas avec mon argent."</p>
    <button onclick="restartGame()" class="arcade-btn" style="width:200px; border-color:#ff2251; color:#ff2251; background:rgba(255,34,81,0.1); letter-spacing:2px;">
        RÉESSAYER
    </button>
</div>
<div class="page">
    <div class="topbar" style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid rgba(255, 160, 30, 0.2);">
        <button onclick="showLeaderboard()" style="background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 0;">
            <span style="font-size: 18px;">🏆</span>
            <div class="logo" style="margin: 0; font-size: 9px; letter-spacing: 2px;">CLASSEMENT</div>
        </button>
        <div style="text-align: right;">
            <div style="font-size: 7px; color: rgba(255,255,255,0.3); letter-spacing: 1px; margin-bottom: 2px; text-transform: uppercase;">Banque</div>
            <div id="bankAmt" style="color: #ff9f1e; font-weight: bold; font-size: 14px; letter-spacing: 1px;">$1 000</div>
        </div>
    </div> <div class="char-row">
        <div class="char-emoji" id="charEmoji">
            <img src="images/b_notbad.png" style="width:110px; height:auto;">
        </div>
        <div class="boss-bubble">
            <span id="bossText">Tu te penses prêt pour ton premier jour ici ? J'en ai vu un paquet de gars comme toi.</span>
        </div>
    </div>
    <div class="chart-box">
        <div class="chart-midline" style="margin-top: 0;"></div>
        <svg id="chartSvg" width="100%" viewBox="0 0 300 55" preserveAspectRatio="none" style="display:block;height:80px;">
            <defs>
                <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
                    <stop id="cgT" offset="0%" stop-color="#00ff94" stop-opacity="0.4"/>
                    <stop id="cgB" offset="100%" stop-color="#00ff94" stop-opacity="0.02"/>
                </linearGradient>
            </defs>
            <path id="chartArea" d="" fill="url(#cg)" />
            <path id="chartLine" d="" fill="none" stroke-width="2.5" stroke-linejoin="round" />
        </svg>
        <div class="phase-lbl" id="phaseLbl">CALME</div>
    </div>

    <div class="gauge-box">
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:8px;color:rgba(255,255,255,0.2);">GAIN / PERTE</span>
            <span class="gauge-val" id="gaugeVal">$0</span>
        </div>
        <div class="gauge-track">
            <div class="gauge-fill" id="gFill"></div>
        </div>
    </div>

    <div class="speed-box">
        <div class="speed-header">
            <div>
                <div style="font-size: 8px; color: #666;">VITESSE</div>
                <div class="speed-label" id="speedLbl">SÉCURISÉ</div>
            </div>
            <div style="text-align: right;">
                <span class="speed-val" id="speedVal">30%</span>
            </div>
        </div>
        
        <input type="range" id="speedSlider" min="10" max="100" value="30" oninput="updateSliderPos()">
        
        <div class="speed-footer">
            <span>LENT</span>
            <span>NORMAL</span>
            <span>RISQUÉ🔥</span>
        </div>
    </div>

  <div class="btn-wrap" id="mainGameButton">
    <button id="holdBtn">JOUER</button>
</div>
    
    <div id="resultBox" style="display:none;">
        <button class="arcade-btn" onclick="nextRound()">▶ REJOUER </button>
    </div>
</div> <div id="leaderboardScreen" style="display:none;"></div>
<script>
const story = [
    { img: 'images/story_1.jpg', text: "Quelle soirée mémorable..." },
    { img: 'images/story_2.jpg', text: "Je vivais enfin la vie dont j'avais toujours rêvé." },
    { img: 'images/elipse_black.jpg', text: "Mais en un instant, j'ai tout perdu.", isElipse: true },
    { img: 'images/story_3.jpg', text: "Là j'ai vraiment merdé. Je ne sais plus... qui je suis... m-mon nom ?", isMemoryLoss: true },
    { img: 'images/story_4.jpg', text: "Plus personne ne voulait entendre parler de moi. Ni ma copine, ni mon boss, ni personne." },
    { img: 'images/story_5.jpg', text: "J'avais l'impression de me perdre moi-même..." },
    { img: 'images/story_6.jpg', text: "Comment je pourrais m'en sortir ? Comment gagner autant d'argent sans travail.. Je suis mort." },
    { img: 'images/elipse_black.jpg', text: "3 jours plus tard...", isElipse: true },
    { img: 'images/story_7.jpg', text: "Monsieur Herald... On dit qu'il vous rend soit fou soit millionnaire." },
    { img: 'images/elipse_black.jpg', text: "Bon, je n'ai pas vraiment d'autres choix...", isElipse: true }
];

let currentSlide = 0;
let gameOverCount = 0; // On compte combien de fois il tombe à zéro

function updateSlide() {
    const slide = story[currentSlide];
    const imgEl = document.getElementById('introImage');
    const textEl = document.getElementById('introText');
    
    textEl.style.opacity = 0;
    setTimeout(() => {
        imgEl.src = slide.img;
        textEl.innerText = slide.text;
        textEl.style.opacity = 1;
        imgEl.style.filter = slide.isElipse ? "brightness(0.3)" : "none";
    }, 200);
}

function nextSlide() {
    currentSlide++;
    if (currentSlide < story.length) {
        updateSlide();
    } else {
        document.getElementById('introScreen').style.display = 'none';
        const playButton = document.getElementById('mainGameButton');
        if(playButton) playButton.style.display = 'none';
        
        bank = 0; 
        updateUI();

        const bossText = document.getElementById('bossText');
        bossText.innerText = "Tiens, voilà 1 000$. Je t'en fais cadeau pour voir ce que tu vaux...";

        let startTime = performance.now();
        function animateBank(currentTime) {
            let elapsed = currentTime - startTime;
            let progress = Math.min(elapsed / 2000, 1);
            bank = Math.floor(progress * 1000);
            updateUI();
            if (progress < 1) requestAnimationFrame(animateBank);
        }
        
        setTimeout(() => requestAnimationFrame(animateBank), 500);

        setTimeout(() => {
            bossText.innerText = "Mais ne déconne pas avec, je n'aime pas perdre de l'argent. AU BOULOT !";
            if(playButton) playButton.style.display = 'flex';
        }, 4500);
    }
}

// Initialise la première image au chargement
updateSlide();
function updateSlide() {
    const slide = story[currentSlide];
    const imgEl = document.getElementById('introImage');
    const textEl = document.getElementById('introText');
    
    // Animation simple de fondu
    textEl.style.opacity = 0;
    setTimeout(() => {
        imgEl.src = slide.img;
        textEl.innerText = slide.text;
        textEl.style.opacity = 1;
        
        // Style spécial pour les ellipses (fond noir par exemple)
        imgEl.style.filter = slide.isElipse ? "brightness(0.3)" : "none";
    }, 200);
}

// Lancer la première slide au démarrage
updateSlide();
// --- CONFIGURATION DES IMAGES ---
const IMG_PATH = "images/";
const BOSS_SURPRISE = IMG_PATH + "b_surprise.png";
const BOSS_NOTBAD = IMG_PATH + "b_notbad.png";
const BOSS_LOSE = IMG_PATH + "b_lose.png";

// --- VARIABLES D'ÉTAT ---
let bank = 1000;
let speedPct = 30;
let gaugeVal = 0;
let phase = "betting";
let history = [];
let lastT = null;
let rafId = null;

const BOSS_WIN = ["Bien joué… pour une fois.", "C'est pas si mal.", "Tu es au max de tes capacités là ?", "Pas mal du tout, pour un lapin"];
const BOSS_LOSE_TXT = ["Aie... Je devrais peut-être arrêter de regarder.", "J'aurais pas fait ça, perso", "C'était quoi le plan ?", "Ma femme fais 10x mieux que toi.", "Je crois que ça va pas le faire.."];

// --- MOTEUR D'OSCILLATION ---
function createOsc() {
    const C = [
        { l: "CALME", d: [800, 1400], dr: 0, n: 0.3 },
        { l: "HAUSSE", d: [600, 1000], dr: 0.5, n: 0.2 },
        { l: "PIÈGE", d: [400, 700], dr: 2.2, n: 0.15 },
        { l: "CHUTE", d: [300, 600], dr: -3.2, n: 0.4 }
    ];
    let pi = 0, pt = 0, pT = 1000, v = 0, vel = 0;
    return {
        tick(dt, sm) {
            pt += dt * sm;
            if (pt >= pT) {
                pi = (pi + 1) % C.length;
                pt = 0;
                pT = C[pi].d[0] + Math.random() * 500;
            }
            const p = C[pi];
            vel = vel * 0.88 + (-v * 0.04) + (p.dr * 0.012 * sm) + ((Math.random() * 2 - 1) * p.n * 0.5 * sm);
            v = Math.max(-1, Math.min(1, v + vel * (dt / 16)));
            return { value: v, phase: p.l };
        },
        reset() { pi = 0; pt = 0; v = 0; vel = 0; }
    };
}
const osc = createOsc();

// --- MISE À JOUR DE L'INTERFACE ---
function updateUI() {
    const bankEl = document.getElementById("bankAmt");
    const currentBank = Math.floor(bank);
    bankEl.textContent = `$${currentBank.toLocaleString()}`;

    if (currentBank < 0) {
        bankEl.style.color = "#ff2251"; 
    } else if (currentBank > 1000) {
        bankEl.style.color = "#00ff94"; 
    } else {
        bankEl.style.color = "#ffffff"; 
    }
}

function updateSliderPos() {
    const slider = document.getElementById("speedSlider");
    const val = parseInt(slider.value);
    const root = document.querySelector(':root');
    
    // 1. Mise à jour du texte
    document.getElementById("speedVal").textContent = val + "%";
    speedPct = val;

    // 2. Détermination du niveau et de la couleur
    let color, glow, label;
    
    if (val < 40) {
        color = "#00f7c2"; // Vert/Cyan
        glow = "rgba(0, 247, 194, 0.6)";
        label = "SÉCURISÉ";
    } else if (val < 80) {
        color = "#ffdd00"; // Jaune
        glow = "rgba(255, 221, 0, 0.6)";
        label = "AGRESSIF";
    } else {
        color = "#ff2251"; // Rouge
        glow = "rgba(255, 34, 81, 0.6)";
        label = "RISQUE MAX";
    }

    // 3. Application des couleurs aux variables CSS
    root.style.setProperty('--speed-color', color);
    root.style.setProperty('--speed-glow', glow);
    document.getElementById("speedLbl").textContent = label;

    // 4. Remplissage de la barre
    const min = parseInt(slider.min);
    const max = parseInt(slider.max);
    const percent = ((val - min) * 100) / (max - min);
    slider.style.background = `linear-gradient(to right, ${color} 0%, ${color} ${percent}%, #222 ${percent}%, #222 100%)`;
}

// Initialisation au chargement
document.getElementById("speedSlider").addEventListener("input", updateSliderPos);

// --- GESTION DU JEU ---
const btn = document.getElementById("holdBtn");

btn.addEventListener("pointerdown", (e) => {
    if (phase !== "betting") return;
    phase = "holding";
    osc.reset();
    history = [];
    lastT = performance.now();
    
    btn.style.background = "radial-gradient(circle,#00ff94,#006635)";
    btn.style.boxShadow = "0 8px 0 #004d28";
    document.getElementById("charEmoji").innerHTML = `<img src="${BOSS_SURPRISE}">`;
    
    function loop(t) {
        if (phase !== "holding") return;
        let dt = t - lastT;
        lastT = t;
        
        const res = osc.tick(dt, 0.3 + (speedPct - 10) / 90 * 2.7);
        gaugeVal = res.value;
        history.push(gaugeVal);
        if (history.length > 80) history.shift();
        
        const color = gaugeVal > 0.5 ? "#00ff94" : gaugeVal > 0 ? "#aaff44" : gaugeVal > -0.35 ? "#ffee00" : "#ff2251";
        const pts = history.map((v, i) => `${(i / (history.length - 1)) * 300},${27 - v * 24}`).join(" L ");
        document.getElementById("chartLine").setAttribute("d", "M " + pts);
        document.getElementById("chartLine").setAttribute("stroke", color);
        document.getElementById("chartArea").setAttribute("d", "M " + pts + " L 300,27 L 0,27 Z");
        document.getElementById("cgT").setAttribute("stop-color", color);
        document.getElementById("phaseLbl").textContent = res.phase;
        document.getElementById("phaseLbl").style.color = color;

        const profit = Math.floor(gaugeVal * (bank * (speedPct / 100)));
        const gv = document.getElementById("gaugeVal");
        gv.textContent = (profit >= 0 ? "+$" : "-$") + Math.abs(profit);
        gv.style.color = color;
        
        const gf = document.getElementById("gFill");
        gf.style.width = Math.abs(gaugeVal * 50) + "%";
        gf.style.left = gaugeVal >= 0 ? "50%" : (50 - Math.abs(gaugeVal * 50)) + "%";
        gf.style.background = color;

        rafId = requestAnimationFrame(loop);
    }
    rafId = requestAnimationFrame(loop);
});
btn.addEventListener("pointerup", () => {
    if (phase !== "holding") return;
    phase = "result";
    cancelAnimationFrame(rafId);
    
    const profit = Math.floor(gaugeVal * (bank * (speedPct / 100)));
    bank += profit;
    
    document.getElementById("mainGameButton").style.display = "none"; 
    document.getElementById("resultBox").style.display = "block";    
    
    const charEl = document.getElementById("charEmoji");
    const bossTxtEl = document.getElementById("bossText");

    // LOGIQUE DE DÉFAITE / VICTOIRE
    if (profit >= 0) {
        bossTxtEl.textContent = BOSS_WIN[Math.floor(Math.random() * BOSS_WIN.length)];
        charEl.innerHTML = `<img src="${BOSS_NOTBAD}">`;    
    } else {
        bossTxtEl.textContent = BOSS_LOSE_TXT[Math.floor(Math.random() * BOSS_LOSE_TXT.length)];
        charEl.innerHTML = `<img src="${BOSS_LOSE}">`; 
    }

    updateUI();

    // --- VÉRIFICATION DU GAME OVER ---
    if (bank <= 0) {
        bank = 0;
        updateUI();
        gameOverCount++;

        if (gameOverCount === 1) {
            // Première chance
            setTimeout(() => {
                bossTxtEl.innerText = "C'est une blague ? Tu as déjà tout perdu ? Allez, je te redonne 1 000$, mais c'est la DERNIÈRE fois.";
                charEl.innerHTML = `<img src="${BOSS_NOTBAD}">`;
                bank = 1000;
                updateUI();
            }, 1500);
        } else {
            // Deuxième fois : Game Over direct
            setTimeout(showGameOver, 1000);
        }
    }
});

function nextRound() {
    phase = "betting";
    
    // 1. On cache les résultats
    document.getElementById("resultBox").style.display = "none";
    
    // 2. On réaffiche le conteneur du bouton principal (celui de l'intro)
    const playButton = document.getElementById('mainGameButton');
    playButton.style.display = 'flex'; 
    
    // 3. Reset du look du bouton
    const btn = document.getElementById("holdBtn");
    btn.style.background = "radial-gradient(circle at 35% 30%,#ff2251 0%,#aa1535 60%,#660d20 100%)";
    btn.style.boxShadow = "0 8px 0 #4d0a18";
    
    // 4. Reset du Boss
    document.getElementById("charEmoji").innerHTML = `<img src="${BOSS_NOTBAD}">`;
    document.getElementById("bossText").textContent = "Prouve-moi que c'était pas du hasard.";
    
    updateUI();
}

// Initialisation
updateSliderPos();
updateUI();
    // === LOGIQUE DE NAVIGATION DES ÉCRANS ===

let playerName = localStorage.getItem('greedPlayerName') || "";

function updateSlide() {
    const slide = story[currentSlide];
    const imgEl = document.getElementById('introImage');
    const textEl = document.getElementById('introText');
    
    textEl.style.opacity = 0;
    setTimeout(() => {
        imgEl.src = slide.img;
        textEl.innerText = slide.text;
        textEl.style.opacity = 1;
        imgEl.style.filter = slide.isElipse ? "brightness(0.3)" : "none";

        // GESTION DE LA PERTE DE MÉMOIRE
        if (slide.isMemoryLoss && !playerName) {
            setTimeout(() => {
                let name = prompt("Attends... C'est quoi mon nom déjà ?");
                if (!name || name.trim() === "") name = "Inconnu";
                playerName = name;
                localStorage.setItem('greedPlayerName', playerName);
                textEl.innerText = `... ${playerName}. Oui, c'est ça. Je m'appelle ${playerName}.`;
            }, 800);
        }
    }, 200);
}

function showLeaderboard() {
    // 1. On pointe sur le NOUVEL ID "leaderboardScreen"
    const boardPage = document.getElementById('leaderboardScreen');
    const gamePage = document.querySelector('.page');

    if (!boardPage) {
        console.error("L'élément leaderboardScreen est introuvable !");
        return;
    }

    // 2. On bascule l'affichage
    gamePage.style.display = 'none';
    boardPage.style.display = 'block';

    // 3. On génère le contenu
    const scores = [
        { name: "HERALD_BOSS 👑", score: 850230 },
        { name: (playerName || "L'Anonyme") + " (YOU)", score: Math.floor(bank) },
        { name: "KROOS_44", score: 12400 },
        { name: "S_JOBS_GHOST", score: 8500 },
        { name: "TRADER_DU_DIMANCHE", score: 1200 }
    ].sort((a, b) => b.score - a.score);

    boardPage.innerHTML = `
        <div style="background:#0d0a06; min-height:100vh; padding:20px; color:white; font-family:'DM Mono', monospace;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom:10px; border-bottom:1px solid rgba(255, 160, 30, 0.2);">
                <button onclick="showGameScreen()" style="background:none; border:1px solid #ffaa1e; color:#ffaa1e; padding:5px 12px; cursor:pointer; font-size:10px; font-family:'DM Mono';">
                    ◀ RETOUR TRAVAIL
                </button>
                <div style="font-size:10px; letter-spacing:2px; color:#ffaa1e;">CLASSEMENT AVRIL</div>
            </div>

            <div style="background:rgba(255,160,30,0.03); border:1px solid rgba(255,160,30,0.1); border-radius:8px; padding:15px;">
                <div style="display:flex; justify-content:space-between; color:rgba(255,255,255,0.4); font-size:9px; margin-bottom:15px;">
                    <span>JOUEUR</span><span>SOLDE</span>
                </div>
                
                <div style="display:flex; flex-direction:column; gap:12px;">
                    ${scores.map((s, i) => `
                        <div style="display:flex; justify-content:space-between; padding-bottom:8px; border-bottom:1px solid #222; ${s.name.includes("(YOU)") ? 'color:#00ff94; font-weight:bold;' : ''}">
                            <span>${i+1}. ${s.name}</span>
                            <span>$${s.score.toLocaleString()}</span>
                        </div>
                    `).join('')}
                </div>
            </div>
        </div>
    `;
}

// N'oublie pas de mettre à jour aussi la fonction de retour !
function showGameScreen() {
    const boardPage = document.getElementById('leaderboardScreen');
    const gamePage = document.querySelector('.page');
    
    if(boardPage) boardPage.style.display = 'none';
    if(gamePage) gamePage.style.display = 'flex';
}
document.getElementById("speedSlider").addEventListener("input", updateSliderPos);
updateSliderPos();
updateUI();
updateSlide();
function showGameOver() {
    const goScreen = document.getElementById('gameOverScreen');
    if(goScreen) goScreen.style.display = 'flex';
}

function restartGame() {
    // 1. Reset des variables
    bank = 0;
    gameOverCount = 0;
    
    // 2. On retourne à la slide de perte de mémoire
    currentSlide = story.findIndex(s => s.isMemoryLoss);
    if (currentSlide === -1) currentSlide = 0; // Sécurité si isMemoryLoss n'est pas trouvé

    // 3. Masquage des écrans et retour à l'intro
    document.getElementById('gameOverScreen').style.display = 'none';
    document.getElementById('resultBox').style.display = 'none';
    document.getElementById('introScreen').style.display = 'flex';
    
    updateSlide();
}
</script>
</body>
</html>
