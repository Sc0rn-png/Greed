<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>GREED - Arcade Edition</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* --- STYLES ORIGINAUX (CONSERVÉS) --- */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0d0a06;overflow-x:hidden;}
body{font-family:'DM Mono',monospace;user-select:none;-webkit-user-select:none;color:#fff;}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}
@keyframes btnPulse{0%,100%{box-shadow:0 8px 0 #2a0a00,0 0 30px rgba(255,80,0,0.35)}50%{box-shadow:0 8px 0 #2a0a00,0 0 55px rgba(255,80,0,0.65)}}

.page{width:100%;max-width:480px;margin:0 auto;padding:24px 20px;display:flex;flex-direction:column;gap:12px;position:relative;min-height:100vh;}
.topbar{display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;border-bottom:1px solid rgba(255,160,30,0.2);}
.logo{font-size:11px;letter-spacing:8px;color:rgba(255,160,30,0.7);font-weight:500;}

/* BANQUE */
.bank-wrap{text-align:center;padding:4px 0;}
.bank-amount{font-size:52px;font-weight:300;letter-spacing:-2px;line-height:1;text-shadow:0 0 30px rgba(255,160,30,0.2);}

/* CHARTE NÉON */
.chart-box{background:rgba(0,0,0,0.4);border:1px solid rgba(255,160,30,0.15);border-radius:6px;padding:8px 0;position:relative;overflow:hidden;}
.chart-midline{position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,255,255,0.06);z-index:1;}
.phase-lbl{position:absolute;top:5px;left:8px;font-size:8px;letter-spacing:2px;z-index:2;}

/* BOSS */
.char-row{display:flex;align-items:flex-end;gap:12px;min-height:90px;}
.char-emoji{font-size:64px;line-height:1;}
.boss-bubble{flex:1;background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(255,180,0,0.25);border-radius:0 12px 12px 12px;padding:10px 12px;font-size:11px;color:rgba(255,220,100,0.9);line-height:1.5;font-style:italic;}

/* GAUGE */
.gauge-val{font-size:24px;font-weight:500;transition:color 0.1s;}
.gauge-track{position:relative;height:16px;background:rgba(0,0,0,0.5);border-radius:8px;overflow:hidden;border:1px solid rgba(255,160,30,0.15);}
.gauge-fill{position:absolute;top:0;bottom:0;border-radius:8px;left:50%;width:0%;}

/* BOUTON */
.btn-wrap{display:flex;justify-content:center;padding:20px 0;}
#holdBtn{width:130px;height:130px;border-radius:50%;border:none;cursor:pointer;outline:none;background:radial-gradient(circle at 35% 30%,#ff2251 0%,#aa1535 60%,#660d20 100%);box-shadow:0 8px 0 #4d0a18;color:#fff;font-weight:bold;animation:btnPulse 2s infinite;}
#holdBtn:active{transform:translateY(4px);box-shadow:0 4px 0 #4d0a18;}

/* RÉSULTATS */
#resultBox{display:none;animation:slideUp 0.3s ease;}
.arcade-btn{width:100%;padding:16px 0;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:5px;background:rgba(255,160,30,0.1);border:2px solid #ff9f1e;color:#ff9f1e;border-radius:6px;cursor:pointer;margin-top:10px;}
</style>
</head>
<body>

<div class="page">
    <div class="topbar"><div class="logo">◈ GREED ◈</div><div id="roundInfo">ROUND 1</div></div>
    
    <div class="bank-wrap">
        <div class="bank-amount" id="bankAmt">$1 000</div>
    </div>

    <div class="char-row">
        <div class="char-emoji" id="charEmoji">😐</div>
        <div class="boss-bubble">
            <span id="bossText">Prouve-moi que c'était pas un accident.</span>
        </div>
    </div>

    <div class="chart-box">
        <div class="chart-midline"></div>
        <svg id="chartSvg" width="100%" viewBox="0 0 300 55" preserveAspectRatio="none" style="display:block;height:80px;">
            <defs>
                <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
                    <stop id="cgT" offset="0%" stop-color="#00ff94" stop-opacity="0.4"/>
                    <stop id="cgB" offset="100%" stop-color="#00ff94" stop-opacity="0.02"/>
                </linearGradient>
            </defs>
            <path id="chartArea" d="" fill="url(#cg)" />
            <path id="chartLine" d="" fill="none" stroke-width="2.5" stroke-linejoin="round" />
        </svg>
        <div class="phase-lbl" id="phaseLbl">CALME</div>
    </div>

    <div class="gauge-box">
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:8px;color:rgba(255,255,255,0.2);">GAIN / PERTE</span>
            <span class="gauge-val" id="gaugeVal">$0</span>
        </div>
        <div class="gauge-track">
            <div class="gauge-fill" id="gFill"></div>
        </div>
    </div>

    <div style="background:rgba(0,0,0,0.3);padding:15px;border-radius:6px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:10px;color:#ff9f1e;">
        <span>VITESSE</span>
        <span id="speedDisplay">30%</span>
            <input type="range" id="speedSlider" min="10" max="100" step="5" value="30" style="width:100%;accent-color:#ff9f1e;"/>
    </div>
    </div>

    <div class="btn-wrap" id="btnWrap">
        <button id="holdBtn">JOUER</button>
    </div>

    <div id="resultBox">
        <button class="arcade-btn" onclick="nextRound()">▶ ROUND SUIVANT</button>
    </div>
</div>

<div style="background:rgba(0,0,0,0.3);padding:15px;border-radius:6px;">
    <div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:10px;color:#ff9f1e;">
        <span>VITESSE</span>
        <span id="speedDisplay">30%</span>
    </div>
    
    <input type="range" id="speedSlider" min="10" max="100" step="5" value="30" style="width:100%;accent-color:#ff9f1e;"/>
</div>
    
<script>
// --- LOGIQUE CORE (RÉTABLIE) ---
let bank=1000, speedPct=30, gaugeVal=0, phase="betting", round=1, history=[], lastT=null, rafId=null;

const BOSS_WIN=["Bien joué… pour une fois.","Bravo ! Tu vois quand tu veux.","Pas mal du tout."];
const BOSS_LOSE=["Aie... C'est de l'expérience, disons.","J'aurais pas fait ça.","C'était quoi le plan ?"];

function createOsc(){
    const C=[{l:"CALME",d:[800,1400],dr:0,n:0.3},{l:"HAUSSE",d:[600,1000],dr:0.5,n:0.2},{l:"PIÈGE",d:[400,700],dr:2.2,n:0.15},{l:"CHUTE",d:[300,600],dr:-3.2,n:0.4}];
    let pi=0,pt=0,pT=1000,v=0,vel=0;
    return{
        tick(dt,sm){
            pt+=dt*sm; if(pt>=pT){pi=(pi+1)%C.length;pt=0;pT=C[pi].d[0]+Math.random()*500;}
            const p=C[pi];
            vel=vel*0.88+(-v*0.04)+(p.dr*0.012*sm)+((Math.random()*2-1)*p.n*0.5*sm);
            v=Math.max(-1,Math.min(1,v+vel*(dt/16))); return{value:v,phase:p.l};
        },
        reset(){pi=0;pt=0;v=0;vel=0;}
    };
}
const osc=createOsc();

function updateUI(){
    document.getElementById("bankAmt").textContent=`$${Math.floor(bank).toLocaleString()}`;
    document.getElementById("roundInfo").textContent=`ROUND ${round}`;
}

const btn=document.getElementById("holdBtn");

btn.addEventListener("pointerdown",(e)=>{
    if(phase!=="betting") return;
    phase="holding";
    osc.reset(); history=[]; lastT=performance.now();
    btn.style.background="radial-gradient(circle,#00ff94,#006635)";
    btn.style.boxShadow="0 8px 0 #004d28";
    document.getElementById("charEmoji").textContent="😰";

    function loop(t){
        let dt=t-lastT; lastT=t;
        const res=osc.tick(dt, 0.3+(speedPct-10)/90*2.7);
        gaugeVal=res.value;
        history.push(gaugeVal); if(history.length>80) history.shift();
        
        // Dessin charte
        const color=gaugeVal>0.5?"#00ff94":gaugeVal>0?"#aaff44":gaugeVal>-0.35?"#ffee00":"#ff2251";
        const pts=history.map((v,i)=>`${(i/(history.length-1))*300},${27-v*24}`).join(" L ");
        document.getElementById("chartLine").setAttribute("d","M "+pts);
        document.getElementById("chartLine").setAttribute("stroke",color);
        document.getElementById("chartArea").setAttribute("d","M "+pts+" L 300,27 L 0,27 Z");
        document.getElementById("cgT").setAttribute("stop-color",color);
        document.getElementById("phaseLbl").textContent=res.phase;
        document.getElementById("phaseLbl").style.color=color;

        // Gauge
        const profit=Math.floor(gaugeVal*(bank*(speedPct/100)));
        const gv=document.getElementById("gaugeVal");
        gv.textContent=(profit>=0?"+$":"-$")+Math.abs(profit);
        gv.style.color=color;
        const gf=document.getElementById("gFill");
        gf.style.width=Math.abs(gaugeVal*50)+"%";
        gf.style.left=gaugeVal>=0?"50%":(50-Math.abs(gaugeVal*50))+"%";
        gf.style.background=color;

        if(phase==="holding") rafId=requestAnimationFrame(loop);
    }
    rafId=requestAnimationFrame(loop);
});

btn.addEventListener("pointerup",()=>{
    if(phase!=="holding") return;
    phase="result";
    cancelAnimationFrame(rafId);
    const profit=Math.floor(gaugeVal*(bank*(speedPct/100)));
    bank+=profit;
    document.getElementById("btnWrap").style.display="none";
    document.getElementById("resultBox").style.display="block";
    document.getElementById("bossText").textContent=profit>=0?BOSS_WIN[Math.floor(Math.random()*3)]:BOSS_LOSE[Math.floor(Math.random()*3)];
    document.getElementById("charEmoji").textContent=profit>=0?"🤑":"😭";
    updateUI();
});

function nextRound(){
    phase="betting"; round++;
    document.getElementById("btnWrap").style.display="flex";
    document.getElementById("resultBox").style.display="none";
    btn.style.background="radial-gradient(circle at 35% 30%,#ff2251 0%,#aa1535 60%,#660d20 100%)";
    btn.style.boxShadow="0 8px 0 #4d0a18";
    document.getElementById("charEmoji").textContent="😐";
    updateUI();
}

document.getElementById("speedSlider").addEventListener("input", function() {
    speedPct = this.value;
    // Cette ligne met à jour l'affichage du pourcentage
    document.getElementById("speedDisplay").textContent = this.value + "%";
});
updateUI();
</script>
</body>
</html>
